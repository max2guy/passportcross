<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2248"/>
      <stop offset="100%" stop-color="#13162b"/>
    </linearGradient>
    <!-- 금색 그라디언트 -->
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f2e09a"/>
      <stop offset="35%"  stop-color="#d4a84c"/>
      <stop offset="100%" stop-color="#9e7e30"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9e7e30"/>
      <stop offset="40%"  stop-color="#d4a84c"/>
      <stop offset="60%"  stop-color="#d4a84c"/>
      <stop offset="100%" stop-color="#9e7e30"/>
    </linearGradient>
    <!-- 중앙 글로우 -->
    <radialGradient id="glow" cx="256" cy="290" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <!-- 십자가 글로우 필터 -->
    <filter id="cf" x="-30%" y="-10%" width="160%" height="120%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- 중앙 글로우 -->
  <rect width="512" height="512" rx="90" fill="url(#glow)"/>

  <!-- 외부 프레임 -->
  <rect x="17" y="17" width="478" height="478" rx="76"
        fill="none" stroke="#c9a84c" stroke-width="2.8" opacity="0.7"/>
  <!-- 내부 프레임 -->
  <rect x="29" y="29" width="454" height="454" rx="65"
        fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.3"/>

  <!-- 십자가 글로우 레이어 -->
  <rect x="234" y="68" width="44" height="376" rx="8"
        fill="#c9a84c" opacity="0.18" filter="url(#cf)"/>
  <rect x="114" y="158" width="284" height="44" rx="8"
        fill="#c9a84c" opacity="0.14" filter="url(#cf)"/>

  <!-- 십자가 본체 — 세로 -->
  <rect x="234" y="68" width="44" height="376" rx="7" fill="url(#gv)"/>
  <!-- 십자가 본체 — 가로 -->
  <rect x="114" y="158" width="284" height="44" rx="7" fill="url(#gh)"/>

  <!-- 코너 브래킷 장식 -->
  <g stroke="#c9a84c" stroke-width="3" stroke-linecap="round"
     fill="none" opacity="0.55">
    <!-- 좌상 -->
    <path d="M52,52 v30 M52,52 h30"/>
    <!-- 우상 -->
    <path d="M460,52 v30 M460,52 h-30"/>
    <!-- 좌하 -->
    <path d="M52,460 v-30 M52,460 h30"/>
    <!-- 우하 -->
    <path d="M460,460 v-30 M460,460 h-30"/>
  </g>

  <!-- 가로 막대 위아래 얇은 장식선 -->
  <line x1="114" y1="157" x2="398" y2="157"
        stroke="#c9a84c" stroke-width="0.8" opacity="0.35"/>
  <line x1="114" y1="203" x2="398" y2="203"
        stroke="#c9a84c" stroke-width="0.8" opacity="0.35"/>
</svg>
