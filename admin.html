<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>THE CROSS PASSPORT — 관리자</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#17192e;--bg2:#21243e;--bg3:#2a2f4a;
  --gold:#c9a84c;--gold-dim:#9e8038;--gold-bright:#e8d282;
  --wine:#7e2038;--wine-light:#9e3048;
  --green:#2a6b3a;--green-light:#3a8a50;
  --text:#ede9de;--text-dim:#8e98b8;
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
/* LOGIN */
.login-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:-webkit-fill-available;
  padding:calc(var(--safe-top) + 24px) 20px calc(var(--safe-bottom) + 24px);
}
.login-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid rgba(197,165,90,.2);border-radius:var(--radius);padding:36px 28px}
.login-brand{text-align:center;margin-bottom:24px}
.login-title{font-size:11px;font-weight:700;color:var(--gold-dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.login-title-main{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px}
.login-sub{font-size:12px;color:var(--text-dim);margin-top:6px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px}
.login-field input{
  width:100%;padding:13px 14px;background:var(--bg3);
  border:1px solid rgba(197,165,90,.15);border-radius:var(--radius-sm);
  color:var(--text);font-size:15px;outline:none;
  -webkit-appearance:none;appearance:none;
}
.login-field input:focus{border-color:var(--gold-dim)}
.login-btn{
  width:100%;padding:15px;margin-top:8px;
  background:var(--gold);color:var(--bg);font-size:15px;font-weight:700;
  border:none;border-radius:var(--radius-sm);cursor:pointer;letter-spacing:1px;
  -webkit-appearance:none;appearance:none;
}
.login-btn:active{background:var(--gold-dim)}
.login-error{font-size:13px;color:#e05555;text-align:center;margin-top:12px;min-height:18px;word-break:keep-all}
.login-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid rgba(197,165,90,.15)}
.login-tab{flex:1;padding:11px 8px;text-align:center;font-size:14px;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s}
.login-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.login-form{display:none}.login-form.active{display:block}
/* APP */
.app-wrap{display:none;flex-direction:column;min-height:100vh}
/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-top) + 14px) 16px 14px;
  background:var(--bg2);border-bottom:1px solid rgba(197,165,90,.1);
  position:sticky;top:0;z-index:100;
  gap:10px;
}
.topbar-left{display:flex;flex-direction:column;gap:2px;min-width:0}
.topbar-title{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:1px;white-space:nowrap}
.topbar-email{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-btn{
  padding:7px 12px;background:transparent;
  border:1px solid rgba(197,165,90,.25);border-radius:var(--radius-sm);
  color:var(--text-dim);font-size:12px;cursor:pointer;white-space:nowrap;
  -webkit-appearance:none;appearance:none;
  transition:border-color .2s,color .2s;
}
.topbar-btn:active,.topbar-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.topbar-btn.danger{border-color:rgba(255,100,100,.3);color:#e05555}
/* MAIN CONTENT */
.main-content{width:100%;max-width:900px;margin:0 auto}
/* STATS */
.stats-bar{display:flex;gap:10px;padding:16px 16px 0}
.stat-box{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;min-width:0}
.stat-num{font-size:24px;font-weight:700;color:var(--gold);line-height:1}
.stat-label{font-size:10px;color:var(--text-dim);margin-top:4px;white-space:nowrap}
/* FILTERS */
.filter-bar{
  display:flex;gap:6px;padding:14px 16px 8px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{
  padding:7px 16px;border-radius:20px;
  border:1px solid rgba(197,165,90,.2);background:transparent;
  color:var(--text-dim);font-size:13px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
  transition:all .2s;-webkit-appearance:none;appearance:none;
}
.filter-btn.active{background:rgba(197,165,90,.15);border-color:var(--gold);color:var(--gold)}
/* SECTION */
.section-title{font-size:11px;color:var(--text-dim);letter-spacing:1px;padding:4px 16px 10px;text-transform:uppercase}
/* SUBMISSIONS */
.sub-list{padding:0 16px calc(var(--safe-bottom) + 40px);display:flex;flex-direction:column;gap:10px}
.sub-card{background:var(--bg2);border:1px solid rgba(197,165,90,.1);border-radius:var(--radius);padding:16px}
.sub-card.approved{border-color:rgba(42,107,58,.4);opacity:.75}
.sub-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.sub-name{font-size:15px;font-weight:700;color:var(--text)}
.sub-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.sub-badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.sub-badge.youth{background:rgba(107,29,42,.4);color:var(--gold-bright)}
.sub-badge.young{background:rgba(197,165,90,.15);color:var(--gold)}
.sub-mission{font-size:13px;color:var(--gold-dim);margin-bottom:8px;font-weight:600}
.sub-text{font-size:13px;color:var(--text);line-height:1.6;background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;white-space:pre-wrap;word-break:break-word}
.sub-photo{width:100%;max-height:220px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:10px;display:block}
.sub-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sub-time{font-size:11px;color:var(--text-dim);flex-shrink:0}
.sub-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-approve{padding:9px 18px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none;appearance:none}
.btn-approve:active{background:var(--green-light)}
.btn-reject{padding:9px 14px;background:transparent;border:1px solid rgba(255,100,100,.3);color:#e05555;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none}
.btn-reject:active{background:rgba(255,100,100,.1)}
.status-approved{font-size:12px;color:#3a8a50;font-weight:700}
.status-rejected{font-size:12px;color:#e05555;font-weight:700}
.btn-del-sub{padding:7px 10px;background:transparent;border:1px solid rgba(255,100,100,.2);color:#e05555;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;-webkit-appearance:none;appearance:none}
.empty{text-align:center;color:var(--text-dim);padding:60px 20px;font-size:14px}
.loading{text-align:center;color:var(--text-dim);padding:60px 20px;font-size:14px}
/* 반려 이유 모달 */
.reject-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.reject-overlay.show{display:flex}
.reject-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid rgba(197,165,90,.2);border-radius:var(--radius);padding:24px}
.reject-box h4{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.reject-box p{font-size:13px;color:var(--text-dim);margin-bottom:14px}
.reject-box textarea{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid rgba(197,165,90,.15);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none;font-family:inherit;resize:none;min-height:80px;-webkit-appearance:none;appearance:none}
.reject-box textarea:focus{border-color:rgba(224,85,85,.4)}
.reject-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.reject-cancel{padding:9px 16px;background:transparent;border:1px solid rgba(197,165,90,.2);border-radius:var(--radius-sm);color:var(--text-dim);font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none}
.reject-confirm{padding:9px 18px;background:transparent;border:1px solid rgba(255,100,100,.4);border-radius:var(--radius-sm);color:#e05555;font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none;appearance:none}
.reject-confirm:active{background:rgba(255,100,100,.08)}
/* 마스터 관리자 */
.master-section{padding:16px 16px 20px;display:none;background:rgba(197,165,90,.04);border-bottom:1px solid rgba(197,165,90,.08)}
.master-section.show{display:block}
.master-title{font-size:10px;color:var(--gold-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.admin-card{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid rgba(197,165,90,.1);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;gap:8px}
.admin-info{font-size:13px;color:var(--text);min-width:0;flex:1}
.admin-info span{display:block;font-size:11px;color:var(--text-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-reset-pw{padding:6px 10px;background:transparent;border:1px solid rgba(197,165,90,.3);color:var(--gold-dim);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;white-space:nowrap;-webkit-appearance:none;appearance:none}
.btn-reset-pw:active{border-color:var(--gold);color:var(--gold)}
.btn-del-admin{padding:6px 10px;background:transparent;border:1px solid rgba(255,100,100,.3);color:#e05555;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;-webkit-appearance:none;appearance:none}
.admin-actions{display:flex;gap:4px;flex-shrink:0}
.reset-section{padding:16px 16px 20px;display:none;border-bottom:1px solid rgba(197,165,90,.08)}.reset-section.show{display:block}
.reset-title{font-size:10px;color:var(--gold-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.reset-btns{display:flex;flex-direction:column;gap:8px}
.btn-danger{padding:13px 16px;background:transparent;border:1px solid rgba(255,100,100,.3);color:#e05555;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;text-align:left;word-break:keep-all;line-height:1.5;-webkit-appearance:none;appearance:none}
.btn-danger:active{background:rgba(255,100,100,.08)}
/* 미션 편집 */
.mission-edit-panel{display:none;padding:0 16px 32px}
.mission-edit-panel.show{display:block}
.me-tabs{display:flex;gap:8px;margin-bottom:16px;padding-top:16px}
.me-tab{padding:7px 18px;border-radius:20px;border:1px solid rgba(197,165,90,.2);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none}
.me-tab.active{background:rgba(197,165,90,.15);border-color:var(--gold);color:var(--gold)}
.me-card{background:var(--bg2);border:1px solid rgba(197,165,90,.1);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.me-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:8px}
.me-card-day{font-size:13px;font-weight:700;color:var(--gold-dim);flex-shrink:0}
.me-card-name{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.me-toggle{font-size:18px;color:var(--text-dim);flex-shrink:0}
.me-card-body{display:none;padding:0 16px 16px;border-top:1px solid rgba(197,165,90,.08)}
.me-card-body.open{display:block}
.me-field{margin-top:12px}
.me-field label{display:block;font-size:11px;color:var(--gold-dim);margin-bottom:5px;letter-spacing:.5px}
.me-field input,.me-field textarea{
  width:100%;padding:10px 12px;background:var(--bg3);
  border:1px solid rgba(197,165,90,.15);border-radius:var(--radius-sm);
  color:var(--text);font-size:13px;outline:none;font-family:inherit;
  -webkit-appearance:none;appearance:none;
}
.me-field textarea{resize:vertical;min-height:70px}
.me-field input:focus,.me-field textarea:focus{border-color:var(--gold-dim)}
.btn-save-mission{margin-top:12px;padding:10px 20px;background:var(--gold);color:var(--bg);font-size:13px;font-weight:700;border:none;border-radius:var(--radius-sm);cursor:pointer;-webkit-appearance:none;appearance:none}
.btn-save-mission:active{background:var(--gold-dim)}
.me-saved{font-size:12px;color:#3a8a50;margin-left:10px;display:none}

/* 완료자 패널 */
.completions-panel{display:none;padding:0 16px calc(var(--safe-bottom)+40px)}
.completions-panel.show{display:block}
.comp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px}
.comp-title{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.comp-count{font-size:12px;color:var(--gold)}
.comp-card{background:var(--bg2);border:1px solid rgba(197,165,90,.1);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.comp-info .comp-name{font-size:15px;font-weight:700;color:var(--text)}
.comp-info .comp-meta{font-size:12px;color:var(--text-dim);margin-top:3px}
.comp-time{text-align:right;flex-shrink:0}
.comp-time .comp-date{font-size:12px;color:var(--gold-dim)}
.comp-time .comp-clock{font-size:11px;color:var(--text-dim);margin-top:2px}
/* ===== 반응형 ===== */
@media (max-width:390px){
  .topbar-btn{padding:6px 9px;font-size:11px}
  .topbar-title{font-size:14px}
  .stat-num{font-size:20px}
  .btn-approve{padding:9px 14px}
}
@media (min-width:768px){
  .topbar{padding:calc(var(--safe-top) + 16px) 32px 16px}
  .topbar-title{font-size:17px}
  .topbar-btn{padding:8px 16px;font-size:13px}
  .stats-bar{padding:20px 32px 0;gap:16px}
  .stat-num{font-size:28px}
  .stat-label{font-size:11px}
  .filter-bar{padding:16px 32px 10px;gap:8px}
  .section-title{padding:8px 32px 12px}
  .sub-list{padding:0 32px calc(var(--safe-bottom) + 40px);gap:14px}
  .sub-card{padding:20px}
  .sub-photo{max-height:300px}
  .master-section{padding:20px 32px 24px}
  .reset-section{padding:20px 32px 24px}
  .mission-edit-panel{padding:0 32px 40px}
  .login-box{max-width:440px;padding:44px 40px}
}
@media (min-width:1024px){
  .main-content{max-width:1100px}
  .sub-list{display:grid;grid-template-columns:repeat(2,1fr)}
  .sub-photo{max-height:260px}
  .filter-bar{padding:16px 40px 10px}
  .sub-list{padding:0 40px calc(var(--safe-bottom) + 40px)}
  .stats-bar{padding:20px 40px 0}
  .section-title{padding:8px 40px 12px}
}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-title">THE CROSS PASSPORT</div>
      <div class="login-title-main">관리자</div>
      <div class="login-sub">ADMIN PANEL</div>
    </div>
    <div class="login-tabs">
      <div class="login-tab active" onclick="switchTab('login')">로그인</div>
      <div class="login-tab" onclick="switchTab('signup')">계정 만들기</div>
    </div>

    <!-- 로그인 폼 -->
    <div class="login-form active" id="formLogin">
      <div class="login-field">
        <label>이메일</label>
        <input type="email" id="loginEmail" placeholder="이메일 입력" autocomplete="email">
      </div>
      <div class="login-field">
        <label>비밀번호</label>
        <input type="password" id="loginPassword" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="doLogin()">로그인</button>
    </div>

    <!-- 가입 폼 -->
    <div class="login-form" id="formSignup">
      <div class="login-field">
        <label>이름</label>
        <input type="text" id="signupName" placeholder="이름 입력">
      </div>
      <div class="login-field">
        <label>이메일</label>
        <input type="email" id="signupEmail" placeholder="이메일 입력" autocomplete="email">
      </div>
      <div class="login-field">
        <label>비밀번호</label>
        <input type="password" id="signupPassword" placeholder="6자리 이상">
      </div>
      <div class="login-field">
        <label>초대 코드</label>
        <input type="text" id="signupCode" placeholder="관리자에게 받은 초대 코드">
      </div>
      <button class="login-btn" onclick="doSignup()">계정 만들기</button>
    </div>

    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- 관리자 앱 -->
<div class="app-wrap" id="appWrap">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">관리자 패널</div>
      <div class="topbar-email" id="adminEmail"></div>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="toggleCompletions()" id="completionsBtn">완료자</button>
      <button class="topbar-btn" onclick="toggleMissionEdit()" id="missionEditBtn">미션 편집</button>
      <button class="topbar-btn" onclick="location.href='index.html'">앱 전환</button>
      <button class="topbar-btn danger" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main-content">
    <!-- 마스터 관리자 전용 -->
    <div class="master-section" id="masterSection">
      <div class="master-title">계정 관리</div>
      <div id="adminList"><div class="loading">불러오는 중...</div></div>
    </div>
    <div class="reset-section" id="resetSection">
      <div class="reset-title">데이터 관리</div>
      <div class="reset-btns">
        <button class="btn-danger" onclick="resetApproved()">승인 내역 일괄 삭제<br><small style="opacity:.7;font-size:11px">승인된 제출만 삭제하고 미션 상태 초기화</small></button>
        <button class="btn-danger" onclick="resetAll()">전체 미션 리셋<br><small style="opacity:.7;font-size:11px">모든 제출 삭제 + 전 학생 미션 초기화</small></button>
      </div>
    </div>


    <div class="stats-bar" id="statsBar">
      <div class="stat-box"><div class="stat-num" id="statTotal">-</div><div class="stat-label">전체 제출</div></div>
      <div class="stat-box"><div class="stat-num" id="statPending">-</div><div class="stat-label">대기중</div></div>
      <div class="stat-box"><div class="stat-num" id="statApproved">-</div><div class="stat-label">승인완료</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="pending" onclick="setFilter('pending',this)">대기중</button>
      <button class="filter-btn" data-filter="all" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" data-filter="youth" onclick="setFilter('youth',this)">중고등부</button>
      <button class="filter-btn" data-filter="young" onclick="setFilter('young',this)">청년부</button>
      <button class="filter-btn" data-filter="approved" onclick="setFilter('approved',this)">승인완료</button>
    </div>

    <div class="section-title" id="sectionLabel">대기중인 제출</div>
    <div class="sub-list" id="subList"><div class="loading">불러오는 중...</div></div>

    <!-- 완료자 패널 -->
    <div class="completions-panel" id="completionsPanel">
      <div class="comp-header">
        <div class="comp-title">미션 완료자 목록</div>
        <div class="comp-count" id="compCount"></div>
      </div>
      <div id="compList"><div class="loading">불러오는 중...</div></div>
    </div>

function deleteAdmin(uid,name){
  if(!confirm('['+name+'] 계정을 삭제하시겠습니까?\n(Firebase Auth 계정은 유지되나 관리자 권한이 제거됩니다)'))return;
  db.collection('admins').doc(uid).delete().then(function(){
    loadAdminList();
  }).catch(function(e){alert('삭제 실패: '+e.message)});
}

function deleteSubmission(subId,uid,missionIdx){
  if(!confirm('이 제출 내역을 삭제하시겠습니까?'))return;
  db.collection('submissions').doc(subId).delete().then(function(){
    // 해당 미션 상태 초기화
    return db.collection('users').doc(uid).get();
  }).then(function(doc){
    if(!doc.exists)return;
    var missions=doc.data().missions||[0,0,0,0,0,0];
    missions[missionIdx]=0;
    return db.collection('users').doc(uid).update({missions:missions});
  }).catch(function(e){alert('삭제 실패: '+e.message)});
}

function resetApproved(){
  if(!confirm('승인된 제출 내역을 모두 삭제하고 해당 미션을 초기화합니까?'))return;
  var approved=allSubmissions.filter(function(s){return s.status==='approved'});
  if(approved.length===0){alert('삭제할 승인 내역이 없습니다');return}
  var promises=approved.map(function(s){
    return db.collection('submissions').doc(s.id).delete().then(function(){
      return db.collection('users').doc(s.uid).get().then(function(doc){
        if(!doc.exists)return;
        var missions=doc.data().missions||[0,0,0,0,0,0];
        missions[s.missionIdx]=0;
        return db.collection('users').doc(s.uid).update({missions:missions});
      });
    });
  });
  Promise.all(promises).then(function(){alert(approved.length+'개 승인 내역이 삭제되었습니다')})
    .catch(function(e){alert('오류: '+e.message)});
}

function resetAll(){
  if(!confirm('⚠️ 전체 초기화\n\n모든 제출 내역 삭제 + 전 학생 미션 초기화\n\n이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?'))return;
  if(!confirm('정말로 전체 초기화 하시겠습니까?'))return;
  // 모든 제출 삭제
  var subPromises=allSubmissions.map(function(s){return db.collection('submissions').doc(s.id).delete()});
  // 모든 유저 미션 초기화
  var userPromise=db.collection('users').get().then(function(snap){
    var ups=[];
    snap.forEach(function(doc){ups.push(db.collection('users').doc(doc.id).update({missions:[0,0,0,0,0,0],records:['','','','','',''],photos:['','','','','',''],rejectReasons:['','','','','','']}))});
    return Promise.all(ups);
  });
  Promise.all(subPromises.concat([userPromise]))
    .then(function(){alert('전체 초기화 완료')})
    .catch(function(e){alert('오류: '+e.message)});
}

function resetPassword(email){
  if(!confirm(email+'\n\n위 계정으로 비밀번호 재설정 메일을 발송하시겠습니까?'))return;
  auth.sendPasswordResetEmail(email).then(function(){
    alert('재설정 메일을 발송했습니다.\n'+email);
  }).catch(function(e){
    alert('발송 실패: '+e.message);
  });
}

function switchTab(tab){
  document.querySelectorAll('.login-tab').forEach(function(t,i){t.classList.toggle('active',i===(tab==='login'?0:1))});
  document.getElementById('formLogin').classList.toggle('active',tab==='login');
  document.getElementById('formSignup').classList.toggle('active',tab==='signup');
  document.getElementById('loginError').textContent='';
}

function doLogin(){
  var email=document.getElementById('loginEmail').value.trim();
  var pw=document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent='';
  if(!email||!pw){document.getElementById('loginError').textContent='이메일과 비밀번호를 입력하세요';return}
  auth.signInWithEmailAndPassword(email,pw).catch(function(err){
    var msg=err.code==='auth/invalid-credential'?'이메일 또는 비밀번호가 올바르지 않습니다':err.message;
    document.getElementById('loginError').textContent=msg;
  });
}

function doSignup(){
  var name=document.getElementById('signupName').value.trim();
  var email=document.getElementById('signupEmail').value.trim();
  var pw=document.getElementById('signupPassword').value;
  var code=document.getElementById('signupCode').value.trim();
  var err=document.getElementById('loginError');
  err.textContent='';
  if(!name||!email||!pw||!code){err.textContent='모든 항목을 입력하세요';return}
  if(code!==INVITE_CODE){err.textContent='초대 코드가 올바르지 않습니다';return}
  if(pw.length<6){err.textContent='비밀번호는 6자리 이상이어야 합니다';return}
  auth.createUserWithEmailAndPassword(email,pw).then(function(cred){
    var uid=cred.user.uid;
    return cred.user.updateProfile({displayName:name}).then(function(){
      return db.collection('admins').doc(uid).set({name:name,email:email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
  }).then(function(){
    err.style.color='#3a8a50';err.textContent='계정이 생성되었습니다. 로그인해 주세요.';
    auth.signOut();
    setTimeout(function(){switchTab('login');err.textContent='';err.style.color='';},1500);
  }).catch(function(e){
    var msg=e.code==='auth/email-already-in-use'?'이미 사용 중인 이메일입니다':e.message;
    err.textContent=msg;
  });
}

document.getElementById('loginPassword').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});

function startListener(){
  if(unsubscribe)unsubscribe();
  var list=document.getElementById('subList');
  list.innerHTML='<div class="loading">불러오는 중...</div>';
  // orderBy 제거 → 클라이언트 정렬로 대체 (인덱스 불필요)
  unsubscribe=db.collection('submissions').onSnapshot(function(snap){
    allSubmissions=[];
    snap.forEach(function(doc){allSubmissions.push(Object.assign({id:doc.id},doc.data()))});
    // 제출 시간 내림차순 정렬
    allSubmissions.sort(function(a,b){
      var at=a.submittedAt?a.submittedAt.seconds:0;
      var bt=b.submittedAt?b.submittedAt.seconds:0;
      return bt-at;
    });
    updateStats();
    renderList();
  },function(err){
    list.innerHTML='<div class="empty" style="color:#e05555">오류: '+err.code+'<br>'+err.message+'<br><br>Firebase 콘솔 → Firestore → 규칙을 확인하세요.</div>';
    console.error('Firestore 오류:', err);
  });
}

function updateStats(){
  var pending=allSubmissions.filter(function(s){return s.status==='pending'}).length;
  var approved=allSubmissions.filter(function(s){return s.status==='approved'}).length;
  document.getElementById('statTotal').textContent=allSubmissions.length;
  document.getElementById('statPending').textContent=pending;
  document.getElementById('statApproved').textContent=approved;
}

function setFilter(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  var labels={pending:'대기중인 제출',all:'전체 제출',youth:'중고등부 제출',young:'청년부 제출',approved:'승인완료 제출'};
  document.getElementById('sectionLabel').textContent=labels[filter]||'제출 목록';
  renderList();
}

function renderList(){
  var filtered=allSubmissions.filter(function(s){
    if(currentFilter==='pending')return s.status==='pending';
    if(currentFilter==='approved')return s.status==='approved';
    if(currentFilter==='youth')return s.group==='youth';
    if(currentFilter==='young')return s.group==='young';
    return true;
  });
  var list=document.getElementById('subList');
  if(filtered.length===0){list.innerHTML='<div class="empty">제출 내역이 없습니다</div>';return}
  list.innerHTML='';
  filtered.forEach(function(s){
    var card=document.createElement('div');
    card.className='sub-card'+(s.status==='approved'?' approved':'');
    var time=s.submittedAt?new Date(s.submittedAt.seconds*1000).toLocaleString('ko-KR'):'';
    var approvedInfo=s.status==='approved'?'<span class="status-approved">✓ 승인완료</span>':s.status==='rejected'?'<span class="status-rejected">✗ 반려</span>':'';
    var delBtn='<button class="btn-del-sub" onclick="deleteSubmission(\''+s.id+'\',\''+s.uid+'\','+s.missionIdx+')">삭제</button>';
    var actions=s.status==='pending'?
      '<div class="sub-actions"><button class="btn-approve" onclick="approveSubmission(\''+s.id+'\',\''+s.uid+'\','+s.missionIdx+')">승인</button><button class="btn-reject" onclick="rejectSubmission(\''+s.id+'\',\''+s.uid+'\','+s.missionIdx+')">반려</button>'+delBtn+'</div>':
      '<div class="sub-actions">'+approvedInfo+delBtn+'</div>';
    var photoHtml=s.photo?'<img class="sub-photo" src="'+s.photo+'" alt="제출 사진">':'';
    var groupLabel=s.group==='young'?'청년부':'중고등부';
    card.innerHTML=
      '<div class="sub-header">'+
        '<div><div class="sub-name">'+s.userName+'</div><div class="sub-meta">'+s.grade+' · '+groupLabel+'</div></div>'+
        '<span class="sub-badge '+(s.group||'')+'">'+groupLabel+'</span>'+
      '</div>'+
      '<div class="sub-mission">'+s.missionDay+'요일 · '+s.missionName+'</div>'+
      (s.text?'<div class="sub-text">'+escHtml(s.text)+'</div>':'')+
      photoHtml+
      '<div class="sub-footer"><span class="sub-time">'+time+'</span>'+actions+'</div>';
    list.appendChild(card);
  });
}

    snap.forEach(function(doc){items.push(Object.assign({id:doc.id},doc.data()))});
    items.sort(function(a,b){
      var at=a.giftRequestedAt?a.giftRequestedAt.seconds:0;
      var bt=b.giftRequestedAt?b.giftRequestedAt.seconds:0;
      return at-bt;
    });
    document.getElementById('compCount').textContent=items.length+'명';
    if(items.length===0){list.innerHTML='<div class="empty">아직 완료자가 없습니다</div>';return}

      var card=document.createElement('div');card.className='comp-card';
      var dt=item.giftRequestedAt?new Date(item.giftRequestedAt.seconds*1000):null;
      var dateStr=dt?dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric'}):'';
      var timeStr=dt?dt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'';

        '<div class="comp-info">'
          +'<div class="comp-name">'+(idx+1)+'. '+item.userName+'</div>'
          +'<div class="comp-meta">'+item.grade+' · '+groupLabel+'</div>'
        +'</div>'
        +'<div class="comp-time">'
          +'<div class="comp-date">'+dateStr+'</div>'
          +'<div class="comp-clock">'+timeStr+'</div>'
        +'</div>';
      list.appendChild(card);
    });
  },function(err){
    list.innerHTML='<div class="empty" style="color:#e05555">오류: '+err.code+'</div>';
  });
}

function toggleMissionEdit(){
  missionEditVisible=!missionEditVisible;
  document.getElementById('missionEditPanel').classList.toggle('show',missionEditVisible);
  document.getElementById('missionEditBtn').textContent=missionEditVisible?'제출 목록':'미션 편집';
  document.querySelector('.sub-list').style.display=missionEditVisible?'none':'';
  document.querySelector('.filter-bar').style.display=missionEditVisible?'none':'';
  document.querySelector('.section-title').style.display=missionEditVisible?'none':'';
  if(missionEditVisible){
    // 완료자 패널 닫기
    completionsVisible=false;
    document.getElementById('completionsPanel').classList.remove('show');
    document.getElementById('completionsBtn').style.borderColor='';
    document.getElementById('completionsBtn').style.color='';
    if(unsubCompletions){unsubCompletions();unsubCompletions=null;}
    loadMissionEditor();
  }
}

function switchMissionGroup(group,btn){
  currentMissionGroup=group;
  document.querySelectorAll('.me-tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  renderMissionEditor();
}

function loadMissionEditor(){
  db.collection('missionData').get().then(function(snap){
    editableMissions.youth=DEFAULT_MISSIONS_YOUTH.map(function(m){return Object.assign({},m)});
    editableMissions.young=DEFAULT_MISSIONS_YOUNG.map(function(m){return Object.assign({},m)});
    snap.forEach(function(doc){
      if(doc.data().missions){editableMissions[doc.id]=doc.data().missions;}
    });
    renderMissionEditor();
  }).catch(function(){
    editableMissions.youth=DEFAULT_MISSIONS_YOUTH.map(function(m){return Object.assign({},m)});
    editableMissions.young=DEFAULT_MISSIONS_YOUNG.map(function(m){return Object.assign({},m)});
    renderMissionEditor();
  });
}

function renderMissionEditor(){
  var missions=editableMissions[currentMissionGroup];
  var el=document.getElementById('missionEditList');
  el.innerHTML='';
  missions.forEach(function(m,i){
    var card=document.createElement('div');
    card.className='me-card';
    card.innerHTML=
      '<div class="me-card-header" onclick="toggleMeCard('+i+')">'
        +'<span class="me-card-day">'+m.day+'('+m.date+')</span>'
        +'<span class="me-card-name">'+m.name+'</span>'
        +'<span class="me-toggle" id="me-toggle-'+i+'">＋</span>'
      +'</div>'
      +'<div class="me-card-body" id="me-body-'+i+'">'
        +'<div class="me-field"><label>미션 이름</label><input id="me-name-'+i+'" value="'+escAttr(m.name)+'"></div>'
        +'<div class="me-field"><label>미션 내용</label><textarea id="me-content-'+i+'">'+escHtml(m.content)+'</textarea></div>'
        +'<div class="me-field"><label>인증 방법</label><textarea id="me-howto-'+i+'">'+escHtml(m.howto)+'</textarea></div>'
        +'<button class="btn-save-mission" onclick="saveMission('+i+')">저장</button>'
        +'<span class="me-saved" id="me-saved-'+i+'">✓ 저장됨</span>'
      +'</div>';
    el.appendChild(card);
  });
}

function toggleMeCard(i){
  var body=document.getElementById('me-body-'+i);
  var toggle=document.getElementById('me-toggle-'+i);
  var open=body.classList.toggle('open');
  toggle.textContent=open?'－':'＋';
}

function escAttr(str){return str.replace(/"/g,'&quot;')}

function saveMission(i){
  var name=document.getElementById('me-name-'+i).value.trim();
  var content=document.getElementById('me-content-'+i).value.trim();
  var howto=document.getElementById('me-howto-'+i).value.trim();
  if(!name||!content||!howto){alert('모든 필드를 입력하세요');return}
  editableMissions[currentMissionGroup][i].name=name;
  editableMissions[currentMissionGroup][i].content=content;
  editableMissions[currentMissionGroup][i].howto=howto;
  db.collection('missionData').doc(currentMissionGroup).set({missions:editableMissions[currentMissionGroup]})
    .then(function(){
      var s=document.getElementById('me-saved-'+i);
      s.style.display='inline';setTimeout(function(){s.style.display='none'},2000);
    }).catch(function(e){alert('저장 실패: '+e.message)});
}

function approveSubmission(subId,uid,missionIdx){
  var adminEmail=auth.currentUser?auth.currentUser.email:'';
  // 본인 제출은 승인 불가
  if(uid===auth.currentUser.uid){
    alert('본인이 제출한 미션은 직접 승인할 수 없습니다.\n다른 관리자에게 승인을 요청하세요.');
    return;
  }
  var batch=db.batch();
  var subRef=db.collection('submissions').doc(subId);
  batch.update(subRef,{status:'approved',approvedBy:adminEmail,approvedAt:firebase.firestore.FieldValue.serverTimestamp()});
  // 유저 미션 상태 2(승인)로 업데이트
  db.collection('users').doc(uid).get().then(function(doc){
    if(!doc.exists)return;
    var missions=doc.data().missions||[0,0,0,0,0,0];
    missions[missionIdx]=2;
    batch.update(db.collection('users').doc(uid),{missions:missions});
    return batch.commit();
  }).then(function(){
    // 성공 - 리스너가 자동으로 UI 갱신
  }).catch(function(err){alert('오류: '+err.message)});
}

var rejectTarget={subId:null,uid:null,missionIdx:null};

function rejectSubmission(subId,uid,missionIdx){
  rejectTarget={subId:subId,uid:uid,missionIdx:missionIdx};
  document.getElementById('rejectReasonInput').value='';
  document.getElementById('rejectOverlay').classList.add('show');
}

function closeRejectModal(){
  document.getElementById('rejectOverlay').classList.remove('show');
  rejectTarget={subId:null,uid:null,missionIdx:null};
}

function confirmReject(){
  var reason=document.getElementById('rejectReasonInput').value.trim();
  var subId=rejectTarget.subId;var uid=rejectTarget.uid;var missionIdx=rejectTarget.missionIdx;
  closeRejectModal();
  var adminEmail=auth.currentUser?auth.currentUser.email:'';
  var batch=db.batch();
  var subRef=db.collection('submissions').doc(subId);
  batch.update(subRef,{status:'rejected',rejectReason:reason,approvedBy:adminEmail,approvedAt:firebase.firestore.FieldValue.serverTimestamp()});
  db.collection('users').doc(uid).get().then(function(doc){
    if(!doc.exists)return;
    var missions=doc.data().missions||[0,0,0,0,0,0];
    var rejectReasons=doc.data().rejectReasons||['','','','','',''];
    missions[missionIdx]=3;
    rejectReasons[missionIdx]=reason;
    batch.update(db.collection('users').doc(uid),{missions:missions,rejectReasons:rejectReasons});
    return batch.commit();
  }).catch(function(err){alert('오류: '+err.message)});
}
</script>
</body>
</html>
