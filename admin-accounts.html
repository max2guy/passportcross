<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<title>계정 관리 — THE CROSS PASSPORT</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#17192e;--bg2:#21243e;--bg3:#2a2f4a;
  --gold:#c9a84c;--gold-dim:#9e8038;--gold-bright:#e8d282;
  --wine:#7e2038;
  --green:#2a6b3a;--green-light:#3a8a50;
  --text:#ede9de;--text-dim:#8e98b8;
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 14px) 16px 14px;background:var(--bg2);border-bottom:1px solid rgba(197,165,90,.1);position:sticky;top:0;z-index:100;gap:10px}
.topbar-title{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:1px}
.topbar-right{display:flex;gap:6px}
.topbar-btn{padding:6px 12px;background:transparent;border:1px solid rgba(197,165,90,.25);border-radius:var(--radius-sm);color:var(--text-dim);font-size:12px;cursor:pointer;white-space:nowrap;-webkit-appearance:none;appearance:none;transition:border-color .2s,color .2s}
.topbar-btn:active,.topbar-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.topbar-btn.danger{border-color:rgba(255,100,100,.3);color:#e05555}

/* ACCESS DENIED */
.denied{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--text-dim);font-size:14px}
.denied .icon{font-size:48px}

/* CONTENT */
.content{max-width:680px;margin:0 auto;padding:20px 16px calc(var(--safe-bottom)+40px)}

/* SECTION */
.section{background:var(--bg2);border:1px solid rgba(197,165,90,.12);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.section-title{font-size:10px;color:var(--gold-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}

/* ADMIN LIST */
.admin-card{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;gap:8px}
.admin-card:last-child{margin-bottom:0}
.admin-info{font-size:13px;color:var(--text);min-width:0;flex:1}
.admin-info .admin-email{display:block;font-size:11px;color:var(--text-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-actions{display:flex;gap:6px;flex-shrink:0}
.btn-sm{padding:6px 10px;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;-webkit-appearance:none;appearance:none;white-space:nowrap}
.btn-sm.gold{background:transparent;border:1px solid rgba(197,165,90,.3);color:var(--gold-dim)}
.btn-sm.gold:active{border-color:var(--gold);color:var(--gold)}
.btn-sm.red{background:transparent;border:1px solid rgba(255,100,100,.3);color:#e05555}
.btn-sm.red:active{background:rgba(255,100,100,.08)}
.empty-msg{font-size:13px;color:var(--text-dim);padding:8px 0}
.loading-msg{font-size:13px;color:var(--text-dim);padding:8px 0}

/* ADD ADMIN FORM */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--gold-dim);margin-bottom:5px;letter-spacing:.5px}
.field input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid rgba(197,165,90,.15);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;appearance:none}
.field input:focus{border-color:var(--gold-dim)}
.btn-add{width:100%;padding:12px;background:var(--gold);color:var(--bg);font-size:14px;font-weight:700;border:none;border-radius:var(--radius-sm);cursor:pointer;-webkit-appearance:none;appearance:none;margin-top:4px}
.btn-add:active{background:var(--gold-dim)}
.form-msg{font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.form-msg.ok{color:#3a8a50}
.form-msg.err{color:#e05555}

/* INVITE CODE */
.invite-row{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px}
.invite-label{font-size:12px;color:var(--text-dim);flex:1}
.invite-code{font-size:14px;font-weight:700;color:var(--gold);font-family:monospace;letter-spacing:2px}
.btn-copy{padding:6px 12px;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;background:transparent;border:1px solid rgba(197,165,90,.3);color:var(--gold-dim);-webkit-appearance:none;appearance:none}
.btn-copy:active{border-color:var(--gold);color:var(--gold)}

@media(min-width:768px){
  .topbar{padding:calc(var(--safe-top)+16px) 32px 16px}
  .content{padding:24px 32px calc(var(--safe-bottom)+40px)}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">계정 관리</div>
  <div class="topbar-right">
    <button class="topbar-btn" onclick="location.href='admin.html'">← 관리자 패널</button>
    <button class="topbar-btn danger" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="loading-msg" style="text-align:center;padding:60px 0">인증 확인 중...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var INVITE_CODE='cross2026';
var MASTER_EMAIL='max2guy@gmail.com';
var firebaseConfig={apiKey:"AIzaSyCxCyx8-wtwVNmDzOUuVKdJ4kfFcw2VBpY",authDomain:"passport-cross.firebaseapp.com",projectId:"passport-cross",storageBucket:"passport-cross.firebasestorage.app",messagingSenderId:"68059868627",appId:"1:68059868627:web:9191ca01a05edaf055d326"};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();
var auth=firebase.auth();

auth.onAuthStateChanged(function(user){
  if(user && !user.isAnonymous && user.email===MASTER_EMAIL){
    renderPage();
  } else if(user && !user.isAnonymous){
    document.getElementById('mainContent').innerHTML='<div class="denied"><div class="icon">🔒</div><div>마스터 관리자만 접근할 수 있습니다</div><button class="topbar-btn" style="margin-top:8px" onclick="location.href=\'admin.html\'">← 돌아가기</button></div>';
  } else {
    location.href='admin.html';
  }
});

function doLogout(){auth.signOut().then(function(){location.href='admin.html';})}

function renderPage(){
  document.getElementById('mainContent').innerHTML=
    // 관리자 목록
    '<div class="section">'
      +'<div class="section-title">관리자 계정 목록</div>'
      +'<div id="adminList"><div class="loading-msg">불러오는 중...</div></div>'
    +'</div>'
    // 초대 코드
    +'<div class="section">'
      +'<div class="section-title">초대 코드</div>'
      +'<div class="invite-row">'
        +'<span class="invite-label">신규 관리자 가입용 코드</span>'
        +'<span class="invite-code" id="inviteCodeTxt">'+INVITE_CODE+'</span>'
        +'<button class="btn-copy" onclick="copyInviteCode()">복사</button>'
      +'</div>'
    +'</div>'
    // 관리자 추가
    +'<div class="section">'
      +'<div class="section-title">관리자 추가</div>'
      +'<div class="field"><label>이름</label><input id="newName" type="text" placeholder="이름 입력"></div>'
      +'<div class="field"><label>이메일</label><input id="newEmail" type="email" placeholder="이메일 입력" autocomplete="off"></div>'
      +'<div class="field"><label>임시 비밀번호 (6자 이상)</label><input id="newPw" type="password" placeholder="임시 비밀번호"></div>'
      +'<button class="btn-add" onclick="addAdmin()">계정 추가</button>'
      +'<div class="form-msg" id="addMsg"></div>'
    +'</div>';
  loadAdminList();
}

function loadAdminList(){
  var list=document.getElementById('adminList');
  if(!list)return;
  db.collection('admins').get().then(function(snap){
    if(snap.empty){list.innerHTML='<div class="empty-msg">등록된 관리자가 없습니다</div>';return}
    var html='';
    snap.forEach(function(doc){
      var d=doc.data();
      // doc.id가 MASTER_EMAIL이거나 name 필드 없는 FCM 전용 문서는 건너뜀
      if(doc.id===MASTER_EMAIL||d.email===MASTER_EMAIL||!d.name)return;
      html+='<div class="admin-card">'
        +'<div class="admin-info">'+escHtml(d.name)+'<span class="admin-email">'+escHtml(d.email)+'</span></div>'
        +'<div class="admin-actions">'
          +'<button class="btn-sm gold" onclick="resetPassword(\''+escAttr(d.email)+'\')">비밀번호 재설정</button>'
          +'<button class="btn-sm red" onclick="deleteAdmin(\''+doc.id+'\',\''+escAttr(d.name)+'\')">삭제</button>'
        +'</div>'
      +'</div>';
    });
    list.innerHTML=html||'<div class="empty-msg">등록된 관리자가 없습니다</div>';
  }).catch(function(e){
    list.innerHTML='<div class="empty-msg" style="color:#e05555">오류: '+e.code+'</div>';
  });
}

function deleteAdmin(uid,name){
  if(!confirm('['+name+'] 계정을 삭제하시겠습니까?\n(관리자 권한이 제거됩니다)'))return;
  db.collection('admins').doc(uid).delete().then(function(){loadAdminList();})
    .catch(function(e){alert('삭제 실패: '+e.message)});
}

function resetPassword(email){
  if(!confirm(email+'\n\n위 계정으로 비밀번호 재설정 메일을 발송하시겠습니까?'))return;
  auth.sendPasswordResetEmail(email).then(function(){
    alert('재설정 메일을 발송했습니다.\n'+email);
  }).catch(function(e){alert('발송 실패: '+e.message)});
}

function addAdmin(){
  var name=document.getElementById('newName').value.trim();
  var email=document.getElementById('newEmail').value.trim();
  var pw=document.getElementById('newPw').value;
  var msg=document.getElementById('addMsg');
  msg.textContent='';msg.className='form-msg';
  if(!name||!email||!pw){msg.className='form-msg err';msg.textContent='모든 항목을 입력하세요';return}
  if(pw.length<6){msg.className='form-msg err';msg.textContent='비밀번호는 6자리 이상이어야 합니다';return}
  // 현재 마스터 세션 저장
  var masterUser=auth.currentUser;
  // 새 계정 생성 (별도 앱 인스턴스로 — 현재 세션 유지)
  var secondary=firebase.initializeApp(firebaseConfig,'secondary');
  secondary.auth().createUserWithEmailAndPassword(email,pw).then(function(cred){
    return cred.user.updateProfile({displayName:name}).then(function(){
      return db.collection('admins').doc(cred.user.uid).set({name:name,email:email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }).then(function(){
      return secondary.auth().signOut();
    });
  }).then(function(){
    secondary.delete();
    msg.className='form-msg ok';msg.textContent='✓ '+name+' 계정이 추가되었습니다';
    document.getElementById('newName').value='';
    document.getElementById('newEmail').value='';
    document.getElementById('newPw').value='';
    loadAdminList();
  }).catch(function(e){
    secondary.delete().catch(function(){});
    var errMsg=e.code==='auth/email-already-in-use'?'이미 사용 중인 이메일입니다':e.message;
    msg.className='form-msg err';msg.textContent=errMsg;
  });
}

function copyInviteCode(){
  var code=document.getElementById('inviteCodeTxt').textContent;
  navigator.clipboard.writeText(code).then(function(){
    var btn=document.querySelector('.btn-copy');
    btn.textContent='복사됨!';setTimeout(function(){btn.textContent='복사'},1500);
  }).catch(function(){alert('초대 코드: '+code)});
}

function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(str){return String(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
</script>
</body>
</html>
